<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="midGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e65100"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7b1fa2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e7d32"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="820" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#212121">Data Sovereignty Architecture</text>
  <text x="700" y="60" text-anchor="middle" font-size="13" fill="#757575">How OpenFactory + Cloud Scraper sit between your infrastructure and corporate clouds</text>

  <!-- ============================================ -->
  <!-- LEFT ZONE: Your Network / Home Lab -->
  <!-- ============================================ -->
  <rect x="25" y="80" width="380" height="710" rx="16" fill="url(#leftGrad)" stroke="#66bb6a" stroke-width="1.5" opacity="0.7"/>
  <text x="215" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#2e7d32">YOUR NETWORK</text>
  <text x="215" y="128" text-anchor="middle" font-size="11" fill="#558b2f">Physical hardware you own &amp; control</text>

  <!-- Home Lab / Servers -->
  <rect x="50" y="148" width="330" height="110" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="65" y="172" font-size="14" font-weight="600" fill="#333">Home Lab / Servers</text>
  <text x="65" y="192" font-size="11" fill="#666">Bare metal machines &amp; VM fleet (libvirt/KVM)</text>
  <text x="65" y="209" font-size="11" fill="#666">Build server — assembles ISO images locally</text>
  <text x="65" y="226" font-size="11" fill="#666">NAS / local storage for ISOs, backups, exports</text>
  <text x="65" y="243" font-size="11" fill="#666">OBS (Open Build Service) package building</text>

  <!-- Personal Devices -->
  <rect x="50" y="274" width="330" height="90" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="65" y="298" font-size="14" font-weight="600" fill="#333">Personal Devices</text>
  <text x="65" y="318" font-size="11" fill="#666">Laptops, desktops, workstations</text>
  <text x="65" y="335" font-size="11" fill="#666">Running custom OpenFactory OS images</text>
  <text x="65" y="352" font-size="11" fill="#666">Cloud Scraper installed as desktop app</text>

  <!-- Managed Network -->
  <rect x="50" y="380" width="330" height="90" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="65" y="404" font-size="14" font-weight="600" fill="#333">Managed Network</text>
  <text x="65" y="424" font-size="11" fill="#666">VPN mesh (WireGuard / vplane dataplane)</text>
  <text x="65" y="441" font-size="11" fill="#666">Edge devices, IoT, drones</text>
  <text x="65" y="458" font-size="11" fill="#666">Private VPC tunnel to AWS (10.35.0.0/16)</text>

  <!-- Local Data Store -->
  <rect x="50" y="486" width="330" height="90" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="65" y="510" font-size="14" font-weight="600" fill="#333">Local Data Store</text>
  <text x="65" y="530" font-size="11" fill="#666">Exported cloud data: email, files, photos</text>
  <text x="65" y="547" font-size="11" fill="#666">Calendar, contacts — all in open formats</text>
  <text x="65" y="564" font-size="11" fill="#666">No third-party has access</text>

  <!-- Fleet OS -->
  <rect x="50" y="592" width="330" height="80" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="65" y="616" font-size="14" font-weight="600" fill="#333">Deployed OS Images</text>
  <text x="65" y="636" font-size="11" fill="#666">Debian, Ubuntu, Fedora, openSUSE, Elster OS</text>
  <text x="65" y="653" font-size="11" fill="#666">Each custom-built per machine role</text>

  <!-- Compliance badge -->
  <rect x="50" y="688" width="330" height="50" rx="10" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="215" y="710" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">CIS Benchmarks · GxP · HIPAA · SOC2 · NIST</text>
  <text x="215" y="727" text-anchor="middle" font-size="10" fill="#558b2f">Compliance verified at build time &amp; on boot</text>

  <!-- ============================================ -->
  <!-- MIDDLE ZONE: Sovereignty Layer -->
  <!-- ============================================ -->
  <rect x="445" y="80" width="470" height="710" rx="16" fill="url(#midGrad)" stroke="#ff9800" stroke-width="1.5" opacity="0.7"/>
  <text x="680" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#e65100">SOVEREIGNTY LAYER</text>
  <text x="680" y="128" text-anchor="middle" font-size="11" fill="#bf360c">Your tools, your rules — no vendor lock-in</text>

  <!-- OpenFactory -->
  <rect x="470" y="148" width="420" height="270" rx="12" fill="#fff" filter="url(#shadow)" stroke="#ff9800" stroke-width="1.5"/>
  <circle cx="495" cy="176" r="14" fill="#ff9800"/>
  <text x="495" y="181" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">O</text>
  <text x="516" y="181" font-size="17" font-weight="700" fill="#e65100">OpenFactory</text>
  <text x="485" y="206" font-size="12" fill="#555" font-weight="600">OS Image Factory</text>
  <text x="485" y="226" font-size="11" fill="#666">Build custom Linux OS images (ISO) from natural language</text>
  <text x="485" y="243" font-size="11" fill="#666">AI-powered recipe → package expansion → live-build</text>
  <text x="485" y="260" font-size="11" fill="#666">Supports: Debian, Ubuntu, Fedora, openSUSE, Elster OS</text>
  <text x="485" y="280" font-size="12" fill="#555" font-weight="600">Fleet Management</text>
  <text x="485" y="300" font-size="11" fill="#666">Deploy images to bare metal &amp; VMs remotely</text>
  <text x="485" y="317" font-size="11" fill="#666">Automated testing &amp; CIS benchmark verification</text>
  <text x="485" y="334" font-size="11" fill="#666">Package building via OBS (DEB, RPM)</text>
  <text x="485" y="354" font-size="12" fill="#555" font-weight="600">Compliance Engine</text>
  <text x="485" y="374" font-size="11" fill="#666">AB 1043 age verification · GxP · HIPAA · SOC2</text>
  <line x1="485" y1="387" x2="875" y2="387" stroke="#ffe0b2" stroke-width="1"/>
  <text x="485" y="403" font-size="10" fill="#999">openfactory.tech · console.openfactory.tech · CLI</text>

  <!-- Cloud Scraper -->
  <rect x="470" y="440" width="420" height="200" rx="12" fill="#fff" filter="url(#shadow)" stroke="#7b1fa2" stroke-width="1.5"/>
  <circle cx="495" cy="468" r="14" fill="#7b1fa2"/>
  <text x="495" y="473" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">C</text>
  <text x="516" y="473" font-size="17" font-weight="700" fill="#7b1fa2">Cloud Scraper</text>
  <text x="485" y="498" font-size="12" fill="#555" font-weight="600">Personal Data Export</text>
  <text x="485" y="518" font-size="11" fill="#666">Gmail, Outlook, iCloud → .eml files on disk</text>
  <text x="485" y="535" font-size="11" fill="#666">Drive, OneDrive, iCloud Drive → original files</text>
  <text x="485" y="552" font-size="11" fill="#666">Photos → original resolution, no compression</text>
  <text x="485" y="569" font-size="11" fill="#666">Contacts (.vcf) · Calendar (.ics)</text>
  <text x="485" y="589" font-size="12" fill="#555" font-weight="600">Privacy Model</text>
  <text x="485" y="609" font-size="11" fill="#666">OAuth2 read-only — no intermediary servers</text>
  <line x1="485" y1="618" x2="875" y2="618" stroke="#e1bee7" stroke-width="1"/>
  <text x="485" y="632" font-size="10" fill="#999">GTK4/libadwaita desktop app · packaged as .deb &amp; .rpm</text>

  <!-- The Pattern box -->
  <rect x="470" y="660" width="420" height="80" rx="10" fill="#fff8e1" stroke="#ffb300" stroke-width="1"/>
  <text x="680" y="683" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">The Pattern</text>
  <text x="680" y="702" text-anchor="middle" font-size="11" fill="#555">OpenFactory builds the OS. Cloud Scraper pulls your data out.</text>
  <text x="680" y="719" text-anchor="middle" font-size="11" fill="#555">Together they give you a complete sovereign computing stack —</text>
  <text x="680" y="733" text-anchor="middle" font-size="11" fill="#555">your hardware, your OS, your data, no corporate dependency.</text>

  <!-- ============================================ -->
  <!-- RIGHT ZONE: Corporate Clouds -->
  <!-- ============================================ -->
  <rect x="955" y="80" width="420" height="710" rx="16" fill="url(#rightGrad)" stroke="#42a5f5" stroke-width="1.5" opacity="0.7"/>
  <text x="1165" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#1565c0">CORPORATE CLOUDS &amp; ACCOUNTS</text>
  <text x="1165" y="128" text-anchor="middle" font-size="11" fill="#1976d2">They control access, pricing, ToS &amp; your data</text>

  <!-- Google -->
  <rect x="980" y="148" width="370" height="108" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="995" y="172" font-size="14" font-weight="700" fill="#4285f4">Google</text>
  <text x="995" y="192" font-size="11" fill="#666">Gmail · Google Drive · Google Photos</text>
  <text x="995" y="209" font-size="11" fill="#666">Calendar · Contacts · YouTube · Maps</text>
  <text x="995" y="226" font-size="11" fill="#666">Google Cloud Platform (GCE, GKE, GCS)</text>
  <text x="995" y="246" font-size="11" fill="#999">← Cloud Scraper exports via Gmail &amp; Drive APIs</text>

  <!-- Microsoft -->
  <rect x="980" y="272" width="370" height="108" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="995" y="296" font-size="14" font-weight="700" fill="#00a4ef">Microsoft</text>
  <text x="995" y="316" font-size="11" fill="#666">Outlook · OneDrive · Teams</text>
  <text x="995" y="333" font-size="11" fill="#666">Microsoft 365 · Azure AD / Entra ID</text>
  <text x="995" y="350" font-size="11" fill="#666">Azure Cloud (VMs, AKS, Blob Storage)</text>
  <text x="995" y="370" font-size="11" fill="#999">← Cloud Scraper exports via Microsoft Graph API</text>

  <!-- Apple -->
  <rect x="980" y="396" width="370" height="88" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="995" y="420" font-size="14" font-weight="700" fill="#555">Apple</text>
  <text x="995" y="440" font-size="11" fill="#666">iCloud Drive · iCloud Photos</text>
  <text x="995" y="457" font-size="11" fill="#666">Contacts · Calendar · Notes</text>
  <text x="995" y="474" font-size="11" fill="#999">← Cloud Scraper exports via CalDAV/CardDAV</text>

  <!-- AWS -->
  <rect x="980" y="500" width="370" height="88" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="995" y="524" font-size="14" font-weight="700" fill="#ff9900">AWS</text>
  <text x="995" y="544" font-size="11" fill="#666">App Runner (frontend hosting)</text>
  <text x="995" y="561" font-size="11" fill="#666">S3 (ISO downloads) · CloudFront CDN</text>
  <text x="995" y="578" font-size="11" fill="#999">← OpenFactory uses for hosting &amp; delivery</text>

  <!-- Other SaaS -->
  <rect x="980" y="604" width="370" height="88" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="995" y="628" font-size="14" font-weight="700" fill="#666">Other SaaS</text>
  <text x="995" y="648" font-size="11" fill="#666">GitHub · Slack · Docker Hub</text>
  <text x="995" y="665" font-size="11" fill="#666">ServiceNow · PagerDuty · Datadog</text>
  <text x="995" y="682" font-size="11" fill="#999">← Future Cloud Scraper providers</text>

  <!-- Data Gravity -->
  <rect x="980" y="708" width="370" height="50" rx="10" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
  <text x="1165" y="728" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Vendor lock-in · Terms of Service changes</text>
  <text x="1165" y="745" text-anchor="middle" font-size="10" fill="#1976d2">Price hikes · API deprecation · Account suspensions</text>

  <!-- ============================================ -->
  <!-- ARROWS: Left ↔ Middle (solid — you control) -->
  <!-- ============================================ -->

  <!-- OpenFactory → Home Lab (deploys OS images) -->
  <path d="M 470 220 L 380 200" stroke="#e65100" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="416" y="197" font-size="9" fill="#e65100" text-anchor="middle">deploys ISOs</text>

  <!-- OpenFactory → Devices (fleet management) -->
  <path d="M 470 290 L 380 320" stroke="#e65100" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="416" y="316" font-size="9" fill="#e65100" text-anchor="middle">fleet mgmt</text>

  <!-- OpenFactory → Managed Network (provisions) -->
  <path d="M 470 350 L 380 415" stroke="#e65100" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="412" y="393" font-size="9" fill="#e65100" text-anchor="middle">provisions</text>

  <!-- Cloud Scraper → Local Data Store (saves exports) -->
  <path d="M 470 540 L 380 530" stroke="#7b1fa2" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <text x="418" y="525" font-size="9" fill="#7b1fa2" text-anchor="middle">saves to disk</text>

  <!-- OpenFactory → Fleet OS -->
  <path d="M 470 395 L 380 625" stroke="#e65100" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)" stroke-dasharray="4,3"/>
  <text x="400" y="530" font-size="9" fill="#e65100" text-anchor="middle" transform="rotate(72, 400, 530)">builds</text>

  <!-- ============================================ -->
  <!-- ARROWS: Middle → Right (dashed — pull data) -->
  <!-- ============================================ -->

  <!-- Cloud Scraper → Google -->
  <path d="M 890 480 Q 940 400, 980 200" stroke="#7b1fa2" stroke-width="1.5" fill="none" stroke-dasharray="6,3"/>

  <!-- Cloud Scraper → Microsoft -->
  <path d="M 890 500 Q 935 440, 980 330" stroke="#7b1fa2" stroke-width="1.5" fill="none" stroke-dasharray="6,3"/>

  <!-- Cloud Scraper → Apple -->
  <path d="M 890 520 L 980 440" stroke="#7b1fa2" stroke-width="1.5" fill="none" stroke-dasharray="6,3"/>

  <!-- OpenFactory → AWS -->
  <path d="M 890 350 Q 940 430, 980 540" stroke="#e65100" stroke-width="1.5" fill="none" stroke-dasharray="6,3"/>

  <!-- ============================================ -->
  <!-- FLOW LABELS on dashed lines -->
  <!-- ============================================ -->
  <rect x="920" y="330" width="48" height="16" rx="3" fill="#fff" stroke="#7b1fa2" stroke-width="0.5"/>
  <text x="944" y="341" text-anchor="middle" font-size="8" fill="#7b1fa2">OAuth2</text>

  <rect x="920" y="384" width="48" height="16" rx="3" fill="#fff" stroke="#7b1fa2" stroke-width="0.5"/>
  <text x="944" y="395" text-anchor="middle" font-size="8" fill="#7b1fa2">Graph</text>

  <rect x="920" y="445" width="50" height="16" rx="3" fill="#fff" stroke="#7b1fa2" stroke-width="0.5"/>
  <text x="945" y="456" text-anchor="middle" font-size="8" fill="#7b1fa2">CalDAV</text>

  <rect x="920" y="500" width="48" height="16" rx="3" fill="#fff" stroke="#e65100" stroke-width="0.5"/>
  <text x="944" y="511" text-anchor="middle" font-size="8" fill="#e65100">VPC</text>

  <!-- ============================================ -->
  <!-- DIRECTION LEGEND -->
  <!-- ============================================ -->
  <rect x="25" y="760" width="380" height="30" rx="6" fill="#e8f5e9" stroke="#66bb6a" stroke-width="0.5"/>
  <line x1="45" y1="775" x2="75" y2="775" stroke="#e65100" stroke-width="2"/>
  <text x="80" y="779" font-size="10" fill="#555">solid = you control the connection</text>
  <line x1="210" y1="775" x2="240" y2="775" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="245" y="779" font-size="10" fill="#555">dashed = pulls data from cloud</text>

</svg>
